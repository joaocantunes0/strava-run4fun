<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Ranking – RUN 4 FUN</title>
  <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
</head>
<body>
  <h1>🏆 Ranking Acumulado por Atleta (Top 30)</h1>
  <div id="chart"></div>

  <script>
    fetch("athlete_ranking.csv")
      .then(r => r.text())
      .then(text => {
        const rows = text.trim().split("\n").slice(1, 31);
        const names = [];
        const kms = [];

        rows.forEach(r => {
          const c = r.split(",");
          names.push(c[0]);
          kms.push(Number(c[1]));
        });

        Plotly.newPlot("chart", [{
          x: kms,
          y: names,
          type: "bar",
          orientation: "h"
        }], {
          title: "Top 30 – Km acumulados",
          yaxis: { autorange: "reversed" },
          xaxis: { title: "Km" }
        });
      });
  </script>
</body>
</html>
