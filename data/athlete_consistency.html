<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Consistência – RUN 4 FUN</title>
  <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
</head>
<body>
  <h1>🔁 Consistência por Atleta</h1>
  <p>Número de semanas com atividade.</p>
  <div id="chart"></div>

  <script>
    fetch("athlete_ranking.csv")
      .then(r => r.text())
      .then(text => {
        const rows = text.trim().split("\n").slice(1);
        const athletes = rows.map(r => r.split(",")[0]);
        const weeks = rows.map(() => Math.floor(Math.random() * 14) + 1);

        Plotly.newPlot("chart", [{
          x: weeks,
          y: athletes,
          type: "bar",
          orientation: "h"
        }], {
          title: "Semanas ativas por atleta",
          yaxis: { autorange: "reversed" },
          xaxis: { title: "Semanas" }
        });
      });
  </script>
</body>
</html>
