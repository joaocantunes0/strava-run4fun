<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Evolução Semanal – RUN 4 FUN</title>
  <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
</head>
<body>
  <h1>📈 Evolução Semanal – Km Totais</h1>
  <div id="chart"></div>

  <script>
    fetch("weekly_totals.csv")
      .then(r => r.text())
      .then(text => {
        const rows = text.trim().split("\n").slice(1);
        const weeks = [];
        const kms = [];

        rows.forEach(r => {
          const c = r.split(",");
          weeks.push(c[0]);
          kms.push(Number(c[1]));
        });

        Plotly.newPlot("chart", [{
          x: weeks,
          y: kms,
          type: "scatter",
          mode: "lines+markers"
        }], {
          title: "Quilómetros totais por semana",
          xaxis: { title: "Semana" },
          yaxis: { title: "Km" }
        });
      });
  </script>
</body>
</html>
